<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#09295a">
  <title>Amortizaci&oacute;n - FERM&Iacute;N LIRIANO & ASOCIADOS</title>
  <link rel="manifest" href="manifest.webmanifest">
  <script src="jspdf.umd.min.js"></script>
  <style>
    :root {
      --azul: #09295a;
      --azul-fuerte: #0B49B5;
      --dorado: #C8A24A;
      --borde: #95B3D7;
      --fondo: #f4f7fb;
      --texto: #142033;
      --muted: #5b6d82;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: var(--fondo);
      color: var(--texto);
    }

    .app-header {
      background: #fff;
      border-bottom: 1px solid #d8e2ef;
      padding: 14px;
      text-align: center;
    }

    .brand-wrap {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
    }

    .brand-logo {
      width: 64px;
      height: 64px;
      object-fit: contain;
    }

    .brand {
      margin: 0;
      color: var(--azul);
      font-size: clamp(22px, 5vw, 32px);
      font-weight: 800;
      letter-spacing: 0;
      line-height: 1.1;
    }

    .brand-subtitle {
      margin: 4px 0 0;
      color: var(--dorado);
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 1.5px;
      text-transform: uppercase;
    }

    main {
      width: min(920px, calc(100% - 24px));
      margin: 16px auto 36px;
    }

    .panel,
    .preview {
      background: #fff;
      border: 1px solid #d9e4f1;
      border-radius: 8px;
      padding: 16px;
      box-shadow: 0 12px 30px rgba(9, 41, 90, 0.08);
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 13px;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 7px;
    }

    .full { grid-column: 1 / -1; }

    label {
      font-size: 14px;
      font-weight: 700;
      color: #253a54;
    }

    input {
      width: 100%;
      border: 1px solid #b7c9dd;
      border-radius: 6px;
      font-size: 16px;
      padding: 12px 11px;
      background: #fff;
      color: var(--texto);
      outline: none;
    }

    input:focus {
      border-color: var(--azul-fuerte);
      box-shadow: 0 0 0 3px rgba(11, 73, 181, 0.14);
    }

    .actions {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      margin-top: 16px;
    }

    button {
      appearance: none;
      border: 0;
      border-radius: 6px;
      padding: 13px 12px;
      font-size: 15px;
      font-weight: 800;
      color: #fff;
      background: var(--azul-fuerte);
      cursor: pointer;
    }

    button.secondary { background: var(--azul); }

    button.gold {
      background: var(--dorado);
      color: #15213a;
    }

    button.light {
      background: #fff;
      color: var(--azul);
      border: 1px solid var(--borde);
    }

    button:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    .alert {
      display: none;
      margin-bottom: 14px;
      border: 1px solid #e1a39c;
      background: #fff3f2;
      color: #84251d;
      border-radius: 6px;
      padding: 12px;
      font-weight: 700;
    }

    .hint {
      margin: 13px 0 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
    }

    .preview {
      display: none;
      margin-top: 16px;
    }

    .preview-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 12px;
    }

    .preview h2 {
      margin: 0;
      color: var(--azul);
      font-size: 20px;
    }

    .summary-cards {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
      margin-bottom: 14px;
    }

    .summary-card {
      border: 1px solid #d9e4f1;
      border-left: 4px solid var(--dorado);
      border-radius: 8px;
      padding: 10px;
      background: #fbfcff;
      min-width: 0;
    }

    .summary-label {
      display: block;
      color: var(--muted);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    .summary-value {
      display: block;
      margin-top: 4px;
      color: var(--azul);
      font-size: 16px;
      font-weight: 800;
      overflow-wrap: anywhere;
    }

    .scroll-table {
      overflow-x: auto;
      border: 1px solid var(--borde);
      border-radius: 6px;
    }

    .scroll-table table {
      min-width: 720px;
      border: 0;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }

    th {
      background: var(--azul);
      color: #fff;
      font-weight: 800;
    }

    th, td {
      border: 1px solid var(--borde);
      padding: 8px 7px;
      text-align: center;
      white-space: nowrap;
    }

    #print-area { display: none; }

    .sheet {
      width: 8.5in;
      min-height: 11in;
      margin: 0 auto;
      padding: 50px;
      background: #fff;
      color: #000;
      font-family: Arial, Helvetica, sans-serif;
    }

    .pdf-logo {
      display: block;
      width: 118px;
      height: auto;
      margin: 0 auto 8px;
    }

    .pdf-title {
      margin: 0 0 12px;
      text-align: center;
      color: #09295a;
      font-size: 20px;
      font-weight: 800;
    }

    .client-line {
      margin: 0 0 12px;
      font-size: 10px;
      line-height: 13px;
    }

    .summary-table {
      width: 460px;
      margin: 0 auto 18px;
      font-size: 9px;
    }

    .summary-table td {
      border: 0.8px solid #95B3D7;
      padding: 5px;
      text-align: center;
    }

    .pdf-table {
      width: 490px;
      margin: 0 auto;
      font-size: 8.5px;
    }

    .pdf-table th,
    .pdf-table td {
      border: 0.8px solid #95B3D7;
      padding: 4px;
      text-align: center;
    }

    .pdf-table th {
      background: #09295a;
      color: #fff;
      font-weight: 800;
    }

    .monthly {
      margin: 12px 0 0;
      font-size: 11px;
      font-weight: 800;
    }

    .signatures {
      width: 440px;
      margin: 65px auto 0;
      border-collapse: collapse;
      font-size: 9px;
    }

    .signatures td {
      border: 0;
      width: 220px;
      padding: 4px;
      text-align: center;
    }

    @media (max-width: 640px) {
      main { width: calc(100% - 18px); margin-top: 10px; }
      .panel, .preview { padding: 13px; }
      .grid { grid-template-columns: 1fr; gap: 12px; }
      .actions { grid-template-columns: 1fr; }
      .brand-wrap { flex-direction: column; gap: 6px; }
      .brand-logo { width: 78px; height: 78px; }
      .summary-cards { grid-template-columns: 1fr 1fr; }
    }

    @media print {
      @page { size: letter; margin: 0; }
      body { background: #fff; }
      body > *:not(#print-area) { display: none !important; }
      #print-area { display: block; }
      .sheet {
        width: 8.5in;
        min-height: 11in;
        padding: 50px;
        box-shadow: none;
      }
    }
  </style>
</head>
<body>
  <header class="app-header">
    <div class="brand-wrap">
      <img class="brand-logo" src="logo.png" alt="Logo Fermin Liriano & Asociados">
      <div>
        <h1 class="brand">FERM&Iacute;N LIRIANO</h1>
        <p class="brand-subtitle">&amp; Asociados</p>
      </div>
    </div>
  </header>

  <main>
    <section class="panel">
      <div id="alert" class="alert"></div>

      <form id="loan-form" autocomplete="on">
        <div class="grid">
          <div class="field full">
            <label for="cliente">Nombre del cliente</label>
            <input id="cliente" name="cliente" required>
          </div>

          <div class="field">
            <label for="cedula">C&eacute;dula del cliente</label>
            <input id="cedula" name="cedula" placeholder="000-0000000-0">
          </div>

          <div class="field">
            <label for="direccion">Direcci&oacute;n del cliente</label>
            <input id="direccion" name="direccion" placeholder="Calle, sector, ciudad">
          </div>

          <div class="field full">
            <label for="institucion">Instituci&oacute;n o n&oacute;mina</label>
            <input id="institucion" name="institucion" placeholder="Opcional">
          </div>

          <div class="field">
            <label for="monto">Monto del pr&eacute;stamo</label>
            <input id="monto" name="monto" type="number" min="0.01" step="0.01" required>
          </div>

          <div class="field">
            <label for="tasa">Tasa mensual (%)</label>
            <input id="tasa" name="tasa" type="number" min="0.01" step="0.01" required>
          </div>

          <div class="field">
            <label for="cuotas">Cantidad de cuotas</label>
            <input id="cuotas" name="cuotas" type="number" min="1" step="1" required>
          </div>

          <div class="field">
            <label for="fecha">Fecha del primer pago</label>
            <input id="fecha" name="fecha" type="date" required>
          </div>
        </div>

        <div class="actions">
          <button type="submit">Generar tabla</button>
          <button id="print-btn" class="secondary" type="button" disabled>PDF / Imprimir</button>
          <button id="share-table-btn" class="gold" type="button" disabled>Compartir tabla PDF</button>
          <button id="share-note-btn" class="secondary" type="button" disabled>Compartir pagar&eacute; PDF</button>
          <button id="reset-btn" class="light" type="button">Limpiar</button>
        </div>
      </form>

      <p class="hint">Para enviar por WhatsApp, genera la tabla y toca &ldquo;Compartir tabla PDF&rdquo;. En el men&uacute; del iPhone eliges WhatsApp y el contacto.</p>
    </section>

    <section id="preview" class="preview">
      <div class="preview-head">
        <h2>Vista previa</h2>
      </div>
      <div id="summary-cards" class="summary-cards"></div>
      <div class="scroll-table">
        <table id="preview-table"></table>
      </div>
    </section>
  </main>

  <section id="print-area"></section>

  <script>
    const moneda = new Intl.NumberFormat("en-US", {
      style: "currency",
      currency: "USD",
      minimumFractionDigits: 2,
      maximumFractionDigits: 2
    });

    const form = document.getElementById("loan-form");
    const alertBox = document.getElementById("alert");
    const preview = document.getElementById("preview");
    const previewTable = document.getElementById("preview-table");
    const summaryCards = document.getElementById("summary-cards");
    const printArea = document.getElementById("print-area");
    const printBtn = document.getElementById("print-btn");
    const shareTableBtn = document.getElementById("share-table-btn");
    const shareNoteBtn = document.getElementById("share-note-btn");
    const resetBtn = document.getElementById("reset-btn");

    let currentData = null;
    let logoDataUrlPromise = null;

    function roundMoney(value) {
      return Math.round((value + Number.EPSILON) * 100) / 100;
    }

    function addMonths(date, months) {
      const result = new Date(date.getTime());
      const day = result.getDate();
      result.setMonth(result.getMonth() + months);
      if (result.getDate() !== day) result.setDate(0);
      return result;
    }

    function formatDate(date) {
      const mm = String(date.getMonth() + 1).padStart(2, "0");
      const dd = String(date.getDate()).padStart(2, "0");
      const yy = String(date.getFullYear()).slice(-2);
      return `${mm}/${dd}/${yy}`;
    }

    function parseLocalDate(value) {
      const match = /^(\d{4})-(\d{2})-(\d{2})$/.exec(value);
      if (!match) throw new Error("La fecha de inicio debe ser v&aacute;lida.");
      const year = Number(match[1]);
      const month = Number(match[2]) - 1;
      const day = Number(match[3]);
      const date = new Date(year, month, day);
      if (date.getFullYear() !== year || date.getMonth() !== month || date.getDate() !== day) {
        throw new Error("La fecha de inicio debe ser v&aacute;lida.");
      }
      return date;
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function getInputData() {
      const cliente = form.cliente.value.trim();
      const cedula = form.cedula.value.trim();
      const direccion = form.direccion.value.trim();
      const institucion = form.institucion.value.trim();
      const monto = Number(form.monto.value);
      const tasa = Number(form.tasa.value);
      const cuotas = Number(form.cuotas.value);
      const fechaInicio = parseLocalDate(form.fecha.value);

      if (!cliente) throw new Error("Debe ingresar el nombre del cliente.");
      if (!(monto > 0)) throw new Error("El monto del pr&eacute;stamo debe ser mayor que 0.");
      if (!(tasa > 0)) throw new Error("La tasa mensual debe ser mayor que 0.");
      if (!Number.isInteger(cuotas) || cuotas <= 0) throw new Error("La cantidad de cuotas debe ser mayor que 0.");

      return { cliente, cedula, direccion, institucion, monto, tasa, cuotas, fechaInicio };
    }

    function calculateSchedule(data) {
      const r = data.tasa / 100;
      const n = data.cuotas;
      const factor = Math.pow(1 + r, n);
      const cuota = roundMoney(data.monto * (r * factor) / (factor - 1));
      let saldo = roundMoney(data.monto);
      const rows = [];

      for (let periodo = 1; periodo <= n; periodo += 1) {
        const saldoInicial = saldo;
        const interes = roundMoney(saldoInicial * r);
        let abonoCapital;
        let cuotaPeriodo;
        let saldoRestante;

        if (periodo === n) {
          abonoCapital = saldoInicial;
          cuotaPeriodo = roundMoney(interes + abonoCapital);
          saldoRestante = 0;
        } else {
          abonoCapital = roundMoney(cuota - interes);
          saldoRestante = roundMoney(saldoInicial - abonoCapital);
          cuotaPeriodo = cuota;
        }

        rows.push({ periodo, saldoInicial, interes, abonoCapital, cuota: cuotaPeriodo, saldoRestante });
        saldo = saldoRestante;
      }

      return {
        cuota,
        fechaTermino: addMonths(data.fechaInicio, n - 1),
        rows
      };
    }

    function rowHtml(row) {
      return `
        <tr>
          <td>${row.periodo}</td>
          <td>${moneda.format(row.saldoInicial)}</td>
          <td>${moneda.format(row.interes)}</td>
          <td>${moneda.format(row.abonoCapital)}</td>
          <td>${moneda.format(row.cuota)}</td>
          <td>${moneda.format(row.saldoRestante)}</td>
        </tr>
      `;
    }

    function renderSummary(data, result) {
      summaryCards.innerHTML = `
        <div class="summary-card"><span class="summary-label">Cliente</span><span class="summary-value">${escapeHtml(data.cliente)}</span></div>
        <div class="summary-card"><span class="summary-label">Monto</span><span class="summary-value">${moneda.format(data.monto)}</span></div>
        <div class="summary-card"><span class="summary-label">Cuota mensual</span><span class="summary-value">${moneda.format(result.cuota)}</span></div>
        <div class="summary-card"><span class="summary-label">Fecha t&eacute;rmino</span><span class="summary-value">${formatDate(result.fechaTermino)}</span></div>
      `;
    }

    function renderPreview(data, result) {
      renderSummary(data, result);
      previewTable.innerHTML = `
        <thead>
          <tr>
            <th>Periodo</th>
            <th>Saldo Inicial</th>
            <th>Inter&eacute;s</th>
            <th>Abono a capital</th>
            <th>Cuota</th>
            <th>Saldo Restante</th>
          </tr>
        </thead>
        <tbody>${result.rows.map(rowHtml).join("")}</tbody>
      `;
      preview.style.display = "block";
    }

    function renderPrintSheet(data, result) {
      const clientePdf = data.institucion ? `${data.cliente} / ${data.institucion}` : data.cliente;
      printArea.innerHTML = `
        <div class="sheet">
          <img class="pdf-logo" src="logo.png" alt="Logo">
          <h1 class="pdf-title">FERM&Iacute;N LIRIANO &amp; ASOCIADOS</h1>
          <p class="client-line"><strong>CLIENTE:</strong> ${escapeHtml(clientePdf)}</p>

          <table class="summary-table">
            <tbody>
              <tr>
                <td>Monto</td>
                <td>${moneda.format(data.monto)}</td>
                <td>Tasa</td>
                <td>${data.tasa}% mensual</td>
              </tr>
              <tr>
                <td>Cuotas</td>
                <td>${data.cuotas}</td>
                <td>Fecha inicio</td>
                <td>${formatDate(data.fechaInicio)}</td>
              </tr>
              <tr>
                <td>Fecha t&eacute;rmino</td>
                <td>${formatDate(result.fechaTermino)}</td>
                <td></td>
                <td></td>
              </tr>
            </tbody>
          </table>

          <table class="pdf-table">
            <thead>
              <tr>
                <th>Periodo</th>
                <th>Saldo Inicial</th>
                <th>Inter&eacute;s</th>
                <th>Abono a capital</th>
                <th>Cuota</th>
                <th>Saldo Restante</th>
              </tr>
            </thead>
            <tbody>${result.rows.map(rowHtml).join("")}</tbody>
          </table>

          <p class="monthly">Cuota mensual: ${moneda.format(result.cuota)}</p>

          <table class="signatures">
            <tbody>
              <tr>
                <td>______________________________</td>
                <td>______________________________</td>
              </tr>
              <tr>
                <td>Firma del cliente</td>
                <td>Firma del empleado</td>
              </tr>
            </tbody>
          </table>
        </div>
      `;
    }

    function cleanFileName(value) {
      return value.normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "")
        .replace(/[^a-zA-Z0-9]+/g, "_")
        .replace(/^_+|_+$/g, "") || "Cliente";
    }

    function showError(message) {
      alertBox.innerHTML = message;
      alertBox.style.display = "block";
    }

    function clearError() {
      alertBox.textContent = "";
      alertBox.style.display = "none";
    }

    function getLogoDataUrl() {
      if (!logoDataUrlPromise) {
        logoDataUrlPromise = fetch("logo.png")
          .then((response) => response.blob())
          .then((blob) => new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.onload = () => resolve(reader.result);
            reader.onerror = reject;
            reader.readAsDataURL(blob);
          }))
          .catch(() => null);
      }
      return logoDataUrlPromise;
    }

    function drawCenteredText(doc, text, y, size, bold = false, color = [9, 41, 90]) {
      doc.setFont("helvetica", bold ? "bold" : "normal");
      doc.setFontSize(size);
      doc.setTextColor(...color);
      doc.text(text, 306, y, { align: "center" });
    }

    function drawTableHeader(doc, y, x, widths) {
      const headers = ["Periodo", "Saldo Inicial", "Interes", "Abono a capital", "Cuota", "Saldo Restante"];
      doc.setFillColor(9, 41, 90);
      doc.setDrawColor(149, 179, 215);
      doc.setLineWidth(0.8);
      doc.setTextColor(255, 255, 255);
      doc.setFont("helvetica", "bold");
      doc.setFontSize(8);

      let currentX = x;
      headers.forEach((header, index) => {
        doc.rect(currentX, y, widths[index], 22, "FD");
        doc.text(header, currentX + widths[index] / 2, y + 14, { align: "center" });
        currentX += widths[index];
      });
      return y + 22;
    }

    async function buildAmortizationPdf(data, result) {
      const { jsPDF } = window.jspdf;
      const doc = new jsPDF({ orientation: "portrait", unit: "pt", format: "letter" });
      const logo = await getLogoDataUrl();
      const left = 50;
      const widths = [50, 82, 70, 92, 70, 86];
      const rowHeight = 20;
      let y = 48;

      if (logo) {
        try {
          doc.addImage(logo, "PNG", 246, y, 120, 67);
          y += 78;
        } catch (error) {
          y += 8;
        }
      }

      drawCenteredText(doc, "FERMIN LIRIANO & ASOCIADOS", y, 20, true);
      y += 26;

      const clientePdf = data.institucion ? `${data.cliente} / ${data.institucion}` : data.cliente;
      doc.setFont("helvetica", "bold");
      doc.setFontSize(10);
      doc.setTextColor(0, 0, 0);
      doc.text("CLIENTE:", left, y);
      doc.setFont("helvetica", "normal");
      doc.text(clientePdf, left + 52, y);
      y += 18;

      const summary = [
        ["Monto", moneda.format(data.monto), "Tasa", `${data.tasa}% mensual`],
        ["Cuotas", String(data.cuotas), "Fecha inicio", formatDate(data.fechaInicio)],
        ["Fecha termino", formatDate(result.fechaTermino), "", ""]
      ];
      const summaryWidths = [115, 115, 115, 115];
      doc.setFontSize(9);
      doc.setDrawColor(149, 179, 215);
      summary.forEach((row) => {
        let x = 76;
        row.forEach((cell, index) => {
          doc.rect(x, y, summaryWidths[index], 24);
          doc.text(cell, x + summaryWidths[index] / 2, y + 15, { align: "center" });
          x += summaryWidths[index];
        });
        y += 24;
      });

      y += 18;
      y = drawTableHeader(doc, y, left, widths);
      doc.setFont("helvetica", "normal");
      doc.setFontSize(8);
      doc.setTextColor(0, 0, 0);

      result.rows.forEach((row) => {
        if (y + rowHeight > 710) {
          doc.addPage();
          y = 50;
          y = drawTableHeader(doc, y, left, widths);
          doc.setFont("helvetica", "normal");
          doc.setFontSize(8);
          doc.setTextColor(0, 0, 0);
        }

        const values = [
          String(row.periodo),
          moneda.format(row.saldoInicial),
          moneda.format(row.interes),
          moneda.format(row.abonoCapital),
          moneda.format(row.cuota),
          moneda.format(row.saldoRestante)
        ];
        let x = left;
        values.forEach((cell, index) => {
          doc.rect(x, y, widths[index], rowHeight);
          doc.text(cell, x + widths[index] / 2, y + 13, { align: "center" });
          x += widths[index];
        });
        y += rowHeight;

    const especiales = {

    };
    const decenas = ["", "", "veinte", "treinta", "cuarenta", "cincuenta", "sesenta", "setenta", "ochenta", "noventa"];
    const centenas = ["", "ciento", "doscientos", "trescientos", "cuatrocientos", "quinientos", "seiscientos", "setecientos", "ochocientos", "novecientos"];
    const meses = ["enero", "febrero", "marzo", "abril", "mayo", "junio", "julio", "agosto", "septiembre", "octubre", "noviembre", "diciembre"];

    function numberToSpanishUnderThousand(number) {
      if (number === 0) return "";
      if (number === 100) return "cien";
      if (number < 10) return unidades[number];
      if (number < 30) return especiales[number];
      if (number < 100) {
        const ten = Math.floor(number / 10);
        const unit = number % 10;
        return unit ? `${decenas[ten]} y ${unidades[unit]}` : decenas[ten];
      }
      const hundred = Math.floor(number / 100);
      const rest = number % 100;
      return rest ? `${centenas[hundred]} ${numberToSpanishUnderThousand(rest)}` : centenas[hundred];
    }

    function numberToSpanish(number) {
      const n = Math.round(Math.abs(number));
      if (n === 0) return "cero";
      if (n < 1000) return numberToSpanishUnderThousand(n);

      const millions = Math.floor(n / 1000000);
      const thousands = Math.floor((n % 1000000) / 1000);
      const rest = n % 1000;
      const parts = [];

      if (millions) parts.push(millions === 1 ? "un millon" : `${numberToSpanish(millions)} millones`);
      if (thousands) parts.push(thousands === 1 ? "mil" : `${numberToSpanishUnderThousand(thousands)} mil`);
      if (rest) parts.push(numberToSpanishUnderThousand(rest));
      return parts.join(" ");
    }

    function upperSpanish(number) {
      return numberToSpanish(number).toUpperCase();
    }

    function formatLegalMoney(value) {
      return `RD$ ${Number(value).toLocaleString("en-US", { minimumFractionDigits: 2, maximumFractionDigits: 2 })}`;
    }

    function legalDay(date) {
      return `${numberToSpanish(date.getDate())} (${date.getDate()})`;
    }

    function legalYear(date) {
      return `${upperSpanish(date.getFullYear()).replace("UN MIL", "MIL")} (${date.getFullYear()})`;
    }

    function legalFullDate(date) {
      return `a los ${legalDay(date)} dias de ${meses[date.getMonth()]} del ano ${legalYear(date)}`;
    }

    function legalMonthlyDay(date) {
      return `los dias ${legalDay(date)} de cada mes`;
    }

    function addWrappedParagraph(doc, text, x, y, maxWidth, lineHeight, options = {}) {
      doc.setFont("helvetica", options.bold ? "bold" : "normal");
      doc.setFontSize(options.size || 9.5);
      doc.setTextColor(0, 0, 0);
      const lines = doc.splitTextToSize(text, maxWidth);

          doc.addPage();
          y = 55;
        }
        doc.text(line, x, y, { align: options.align || "justify", maxWidth });
        y += lineHeight;
      });
      return y;
    }

    async function sharePdf(blob, filename, title) {
      const file = new File([blob], filename, { type: "application/pdf" });
      const shareData = {
        title,
        text: "Documento generado por FERMIN LIRIANO & ASOCIADOS.",
        files: [file]
      };

      if (navigator.canShare && navigator.canShare({ files: [file] })) {
        try {
          await navigator.share(shareData);
          return;
        } catch (error) {
          if (error.name === "AbortError") return;
        }
      }

      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = url;
      link.download = filename;
      document.body.appendChild(link);
      link.click();
      link.remove();
      URL.revokeObjectURL(url);
      showError("Tu navegador no permiti&oacute; compartir el PDF directo. Descargu&eacute; el archivo para que puedas enviarlo manualmente por WhatsApp.");
    }
